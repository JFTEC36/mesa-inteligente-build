name: Deploy para EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy-key
          chmod 600 ~/.ssh/deploy-key
          
          # Adicionar host ao known_hosts (segurança)
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Executar deploy na EC2
        run: |
          ssh -i ~/.ssh/deploy-key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "bash ~/mesa-inteligente-build/deploy-mesa.sh"
      
      - name: Notificar sucesso (opcional)
        if: success()
        run: echo "✅ Deploy realizado com sucesso!"
      
      - name: Notificar falha (opcional)
        if: failure()
        run: echo "❌ Falha no deploy. Verifique os logs."